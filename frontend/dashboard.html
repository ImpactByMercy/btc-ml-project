<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoSense DSS - Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0b0c10 0%, #1a1b22 100%);
      font-family: "IBM Plex Mono", monospace;
      color: #c9d1d9;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed; left: 0; top: 0;
      width: 280px; height: 100vh;
      background: #0d0e14;
      border-right: 1px solid #1e2030;
      padding: 30px 20px;
      overflow-y: auto;
    }

    .logo { margin-bottom: 40px; text-align: center; }
    .logo h1 { font-family: "DM Sans", sans-serif; font-size: 2rem; color: #e6edf3; }
    .logo p { font-size: 0.65rem; color: #f0b429; letter-spacing: 2px; }

    .sidebar-section { margin-bottom: 30px; }
    .sidebar-label {
      font-size: 0.65rem; color: #4b5563;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px; display: block;
    }

    .select, .slider {
      width: 100%; padding: 10px;
      background: #0b0c10; border: 1px solid #1e2030;
      border-radius: 6px; color: #c9d1d9;
      font-family: inherit; font-size: 0.85rem; margin-bottom: 15px;
    }
    .select:focus { outline: none; border-color: #f0b429; }

    .button {
      width: 100%; padding: 12px;
      background: #f0b429; color: #0b0c10;
      font-family: "DM Sans", sans-serif; font-weight: 600;
      font-size: 0.85rem; border: none; border-radius: 6px;
      cursor: pointer; transition: all 0.3s;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .button:hover { background: #e6a820; transform: translateY(-2px); }
    .button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .button-secondary { background: #1e2030; color: #c9d1d9; margin-top: 10px; }
    .button-secondary:hover { background: #2a2d3a; }

    .main { margin-left: 280px; padding: 40px; }

    .header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 40px;
    }
    .header h1 { font-family: "DM Sans", sans-serif; font-size: 2rem; color: #e6edf3; }
    .user-info { text-align: right; }
    .user-info p { font-size: 0.8rem; color: #6b7280; margin-bottom: 5px; }

    .divider { height: 1px; background: #1e2030; margin: 30px 0; }

    .signal-box {
      background: rgba(13,14,20,0.95); border: 2px solid #1e2030;
      border-radius: 12px; padding: 30px; text-align: center;
      margin-bottom: 30px; transition: all 0.3s;
    }
    .signal-box.buy  { border-color: #3fb950; background: rgba(63,185,80,0.05); }
    .signal-box.sell { border-color: #f85149; background: rgba(248,81,73,0.05); }
    .signal-box.hold { border-color: #e6b430; background: rgba(230,180,48,0.05); }

    .signal-label { font-size: 0.7rem; color: #4b5563; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .signal-value { font-family: "DM Sans", sans-serif; font-size: 3rem; font-weight: 600; margin-bottom: 15px; }
    .signal-box.buy  .signal-value { color: #3fb950; }
    .signal-box.sell .signal-value { color: #f85149; }
    .signal-box.hold .signal-value { color: #e6b430; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; margin-bottom: 30px;
    }
    .metric {
      background: #0d0e14; border: 1px solid #1e2030;
      border-radius: 8px; padding: 20px;
    }
    .metric-label { font-size: 0.7rem; color: #4b5563; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .metric-value { font-family: "DM Sans", sans-serif; font-size: 1.8rem; font-weight: 600; color: #e6edf3; }
    .metric-delta { font-size: 0.8rem; color: #6b7280; margin-top: 5px; }

    .chart-container {
      background: #0d0e14; border: 1px solid #1e2030;
      border-radius: 8px; padding: 20px; margin-bottom: 30px;
    }
    .chart-title {
      font-family: "DM Sans", sans-serif; font-size: 1.1rem;
      color: #e6edf3; margin-bottom: 20px;
      border-left: 3px solid #f0b429; padding-left: 10px;
    }

    .loading { text-align: center; padding: 40px; color: #6b7280; }
    .spinner {
      border: 2px solid #1e2030; border-top: 2px solid #f0b429;
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .alert.show { display: block; }
    .alert-error  { background: rgba(248,81,73,0.1);  color: #f85149; border: 1px solid #f85149; }
    .alert-success{ background: rgba(63,185,80,0.1);  color: #3fb950; border: 1px solid #3fb950; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 20px; margin-bottom: 30px;
    }

    .rsi-bar-wrap {
      height: 6px; background: #1e2030; border-radius: 3px; margin-top: 8px; position: relative;
    }
    .rsi-bar { height: 6px; border-radius: 3px; transition: width 0.5s; }
    .rsi-marker {
      position: absolute; top: -4px; width: 14px; height: 14px;
      border-radius: 50%; border: 2px solid #0d0e14;
      transform: translateX(-50%); transition: left 0.5s;
    }

    .fg-track {
      height: 6px; border-radius: 3px; margin-top: 8px;
      background: linear-gradient(90deg, #f85149 0%, #e6b430 50%, #3fb950 100%);
      position: relative;
    }
    .fg-thumb {
      position: absolute; top: -5px; width: 16px; height: 16px;
      border-radius: 50%; background: #e6edf3; border: 2px solid #0d0e14;
      transform: translateX(-50%); transition: left 0.5s;
    }

    @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 768px) {
      .sidebar { width:100%; height:auto; position:relative; border-right:none; border-bottom:1px solid #1e2030; padding:20px; }
      .main { margin-left:0; padding:20px; }
      .stats-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <h1>₿</h1>
      <p>CryptoSense DSS</p>
    </div>

    <div class="sidebar-section">
      <label class="sidebar-label">Asset</label>
      <select id="symbol" class="select">
        <option>BTCUSDT</option>
        <option>ETHUSDT</option>
        <option>BNBUSDT</option>
      </select>
    </div>

    <div class="sidebar-section">
      <label class="sidebar-label">Timeframe</label>
      <select id="interval" class="select">
        <option>1h</option>
        <option>4h</option>
        <option selected>1d</option>
      </select>
    </div>

    <div class="sidebar-section">
      <label class="sidebar-label">Signal Threshold (%): <span id="threshold-value">2</span></label>
      <input type="range" id="threshold" class="slider" min="1" max="5" value="2" />
    </div>

    <button class="button" id="btn-analysis" onclick="runAnalysis()">Run Analysis</button>
    <button class="button button-secondary" id="btn-backtest" onclick="runBacktest()">Run Backtest</button>
    <button class="button button-secondary" onclick="logout()">Logout</button>

    <div style="margin-top:30px;border-top:1px solid #1e2030;padding-top:20px;font-size:0.75rem;color:#4b5563;line-height:2;">
      <p><strong>Model:</strong> XGBoost (tuned)</p>
      <p><strong>Balancing:</strong> SMOTE</p>
      <p><strong>Features:</strong> 20 indicators</p>
      <p><strong>Sentiment:</strong> Fear &amp; Greed Index</p>
      <p><strong>Data:</strong> Binance API</p>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <h1>Decision Support System</h1>
      <div class="user-info">
        <p id="user-email">Loading...</p>
        <p>Welcome back</p>
      </div>
    </div>

    <div id="alert" class="alert"></div>

    <div id="content">
      <div style="text-align:center;color:#6b7280;padding:60px;">
        <p style="font-size:1.1rem;margin-bottom:10px;">Configure settings and run analysis</p>
        <p style="font-size:0.85rem;">Select an asset and timeframe, then click Run Analysis</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://btc-ml-project.onrender.com";
    let analysisChart = null;
    let backtestChart = null;

    function checkAuth() {
      if (!localStorage.getItem("token")) window.location.href = "index.html";
    }

    function getToken() { return localStorage.getItem("token"); }

    function showAlert(message, type = "error") {
      const el = document.getElementById("alert");
      el.textContent = message;
      el.className = `alert alert-${type === "error" ? "error" : "success"} show`;
      setTimeout(() => el.className = "alert", 5000);
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user_id");
      window.location.href = "index.html";
    }

    function setLoading(on) {
      document.getElementById("btn-analysis").disabled = on;
      document.getElementById("btn-backtest").disabled = on;
    }

    document.getElementById("threshold").addEventListener("input", e => {
      document.getElementById("threshold-value").textContent = e.target.value;
    });

    async function loadProfile() {
      try {
        const r = await fetch(`${API_URL}/api/user/profile`, {
          headers: { Authorization: `Bearer ${getToken()}` }
        });
        if (r.ok) {
          const d = await r.json();
          document.getElementById("user-email").textContent = d.email || d.name || "User";
        }
      } catch {}
    }

    async function runAnalysis() {
      const symbol   = document.getElementById("symbol").value;
      const interval = document.getElementById("interval").value;
      setLoading(true);
      if (analysisChart) { analysisChart.destroy(); analysisChart = null; }
      if (backtestChart) { backtestChart.destroy(); backtestChart = null; }

      document.getElementById("content").innerHTML =
        '<div class="loading"><div class="spinner"></div>Fetching market data & running model...</div>';

      try {
        const r = await fetch(`${API_URL}/api/predictions`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${getToken()}` },
          body: JSON.stringify({ symbol, interval })
        });
        const data = await r.json();
        if (r.ok) displayResults(data);
        else showAlert(data.message);
      } catch (e) {
        showAlert("Analysis failed: " + e.message);
        document.getElementById("content").innerHTML =
          '<div style="text-align:center;color:#6b7280;padding:40px;">Configure settings and run analysis</div>';
      } finally { setLoading(false); }
    }

    async function runBacktest() {
      const symbol = document.getElementById("symbol").value;
      setLoading(true);
      if (analysisChart) { analysisChart.destroy(); analysisChart = null; }
      if (backtestChart) { backtestChart.destroy(); backtestChart = null; }

      document.getElementById("content").innerHTML =
        '<div class="loading"><div class="spinner"></div>Running backtest simulation...</div>';

      try {
        const r = await fetch(`${API_URL}/api/backtest`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${getToken()}` },
          body: JSON.stringify({ symbol })
        });
        const data = await r.json();
        if (r.ok) displayBacktestResults(data);
        else showAlert(data.message);
      } catch (e) {
        showAlert("Backtest failed: " + e.message);
      } finally { setLoading(false); }
    }

    function displayResults(data) {
      const signal = data.signal;
      const sc = signal === "BUY" ? "buy" : signal === "SELL" ? "sell" : "hold";
      const rsiColor = data.rsi > 70 ? "#f85149" : data.rsi < 30 ? "#3fb950" : "#f0b429";
      const rsiLabel = data.rsi > 70 ? "Overbought" : data.rsi < 30 ? "Oversold" : "Neutral";
      const fgLabel  = data.fear_greed < 25 ? "Extreme Fear" : data.fear_greed < 50 ? "Fear" : data.fear_greed < 75 ? "Greed" : "Extreme Greed";
      const macdColor = data.macd > 0 ? "#3fb950" : "#f85149";

      document.getElementById("content").innerHTML = `
        <div class="signal-box ${sc}">
          <div class="signal-label">Recommendation</div>
          <div class="signal-value">${signal}</div>
          <div style="color:#6b7280;font-size:0.9rem;">${data.symbol} — ${data.interval}</div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-label">Price</div>
            <div class="metric-value">$${Math.round(data.price).toLocaleString()}</div>
          </div>
          <div class="metric">
            <div class="metric-label">RSI (14)</div>
            <div class="metric-value">${data.rsi.toFixed(1)}</div>
            <div class="metric-delta">${rsiLabel}</div>
            <div class="rsi-bar-wrap">
              <div class="rsi-bar" style="width:${data.rsi}%;background:${rsiColor};"></div>
              <div class="rsi-marker" style="left:${data.rsi}%;background:${rsiColor};"></div>
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">Fear &amp; Greed</div>
            <div class="metric-value">${data.fear_greed}<span style="font-size:1rem;color:#6b7280;">/100</span></div>
            <div class="metric-delta">${fgLabel}</div>
            <div class="fg-track">
              <div class="fg-thumb" style="left:${data.fear_greed}%;"></div>
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">MACD Signal</div>
            <div class="metric-value" style="color:${macdColor};">${data.macd > 0 ? "+" : ""}${Math.round(data.macd).toLocaleString()}</div>
            <div class="metric-delta">${data.macd > 0 ? "Bullish momentum" : "Bearish momentum"}</div>
          </div>
        </div>

        <div class="chart-container">
          <div class="chart-title">Indicator Overview</div>
          <div style="position:relative;width:100%;height:260px;">
            <canvas id="analysisChart" role="img" aria-label="Bar chart showing RSI, Fear and Greed index, and MACD signal for ${data.symbol}">RSI: ${data.rsi.toFixed(1)}, Fear & Greed: ${data.fear_greed}, MACD: ${Math.round(data.macd)}</canvas>
          </div>
        </div>`;

      const ctx = document.getElementById("analysisChart").getContext("2d");
      analysisChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["RSI (14)", "Fear & Greed", "MACD (normalised)"],
          datasets: [{
            label: data.symbol,
            data: [data.rsi, data.fear_greed, Math.min(100, Math.max(-100, data.macd / Math.abs(data.macd || 1) * 50 + 50))],
            backgroundColor: [
              data.rsi > 70 ? "rgba(248,81,73,0.6)" : data.rsi < 30 ? "rgba(63,185,80,0.6)" : "rgba(240,180,41,0.6)",
              data.fear_greed < 50 ? "rgba(248,81,73,0.6)" : "rgba(63,185,80,0.6)",
              data.macd > 0 ? "rgba(63,185,80,0.6)" : "rgba(248,81,73,0.6)"
            ],
            borderColor: [
              data.rsi > 70 ? "#f85149" : data.rsi < 30 ? "#3fb950" : "#f0b429",
              data.fear_greed < 50 ? "#f85149" : "#3fb950",
              data.macd > 0 ? "#3fb950" : "#f85149"
            ],
            borderWidth: 1, borderRadius: 4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#6b7280", font: { size: 11 } }, grid: { color: "rgba(30,32,48,0.8)" } },
            y: { min: 0, max: 100, ticks: { color: "#6b7280", font: { size: 11 } }, grid: { color: "rgba(30,32,48,0.8)" } }
          }
        }
      });
    }

    function displayBacktestResults(data) {
      const outColor = data.outperformance_pct > 0 ? "#3fb950" : "#f85149";
      const mlColor  = data.ml_return_pct  > 0 ? "#3fb950" : "#f85149";
      const bhColor  = data.buy_hold_return_pct > 0 ? "#3fb950" : "#f85149";

      document.getElementById("content").innerHTML = `
        <div class="stats-grid">
          <div class="metric">
            <div class="metric-label">ML Strategy</div>
            <div class="metric-value">$${Math.round(data.ml_strategy_value).toLocaleString()}</div>
            <div class="metric-delta" style="color:${mlColor};">${data.ml_return_pct > 0 ? "+" : ""}${data.ml_return_pct.toFixed(2)}%</div>
          </div>
          <div class="metric">
            <div class="metric-label">Buy &amp; Hold</div>
            <div class="metric-value">$${Math.round(data.buy_hold_value).toLocaleString()}</div>
            <div class="metric-delta" style="color:${bhColor};">${data.buy_hold_return_pct > 0 ? "+" : ""}${data.buy_hold_return_pct.toFixed(2)}%</div>
          </div>
          <div class="metric">
            <div class="metric-label">Outperformance</div>
            <div class="metric-value" style="color:${outColor};">${data.outperformance_pct > 0 ? "+" : ""}${data.outperformance_pct.toFixed(2)}%</div>
            <div class="metric-delta">vs passive strategy</div>
          </div>
          <div class="metric">
            <div class="metric-label">Trades Made</div>
            <div class="metric-value">${data.trades}</div>
            <div class="metric-delta">transactions</div>
          </div>
        </div>

        <div class="chart-container">
          <div class="chart-title">Strategy Comparison — $10,000 Starting Capital</div>
          <div style="position:relative;width:100%;height:300px;">
            <canvas id="backtestChart" role="img" aria-label="Bar chart comparing ML strategy vs buy and hold returns for ${data.symbol}">ML Strategy: $${Math.round(data.ml_strategy_value).toLocaleString()} (${data.ml_return_pct.toFixed(2)}%), Buy and Hold: $${Math.round(data.buy_hold_value).toLocaleString()} (${data.buy_hold_return_pct.toFixed(2)}%)</canvas>
          </div>
        </div>`;

      showAlert("Backtest completed successfully!", "success");

      const ctx = document.getElementById("backtestChart").getContext("2d");
      backtestChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Starting Capital", "ML Strategy", "Buy & Hold"],
          datasets: [{
            label: "Portfolio Value ($)",
            data: [10000, data.ml_strategy_value, data.buy_hold_value],
            backgroundColor: ["rgba(30,32,48,0.8)", "rgba(63,185,80,0.6)", "rgba(240,180,41,0.6)"],
            borderColor: ["#2a2d3a", "#3fb950", "#f0b429"],
            borderWidth: 1, borderRadius: 6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` $${Math.round(ctx.parsed.y).toLocaleString()}`
              }
            }
          },
          scales: {
            x: { ticks: { color: "#6b7280", font: { size: 12 } }, grid: { color: "rgba(30,32,48,0.8)" } },
            y: {
              ticks: { color: "#6b7280", font: { size: 11 }, callback: v => "$" + Math.round(v).toLocaleString() },
              grid: { color: "rgba(30,32,48,0.8)" }
            }
          }
        }
      });
    }

    checkAuth();
    loadProfile();
  </script>
</body>
</html>
